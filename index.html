<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Encantos da Fauna Brasil - Experiência IA</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,900;1,700&family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root {
            --primary: #a4c639;
            --gold: #d4af37;
            --bg: #0a0a0a;
            --card: #161616;
            --text: #ffffff;
            --text-dim: #b0b0b0;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            line-height: 1.6;
            overflow-x: hidden;
        }

        .container {
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        @media (min-width: 1024px) {
            .container { flex-direction: row; }
        }

        .magazine-view {
            flex: 1;
            padding: 20px;
            max-width: 1000px;
            margin: 0 auto;
        }

        .hero-card {
            height: 50vh;
            background: linear-gradient(rgba(0,0,0,0.3), rgba(0,0,0,0.9)), 
                        url('https://images.unsplash.com/photo-1541414779316-956a5084c0d4?auto=format&fit=crop&q=80&w=1000') center/cover;
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            padding: 30px;
            margin-bottom: 30px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
        }

        h1 {
            font-family: 'Playfair Display', serif;
            font-size: clamp(30px, 8vw, 55px);
            line-height: 0.9;
            text-transform: uppercase;
        }

        .tagline {
            color: var(--primary);
            text-transform: uppercase;
            font-weight: 800;
            letter-spacing: 4px;
            font-size: 11px;
            margin-bottom: 10px;
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 15px;
        }

        @media (min-width: 600px) {
            .grid { grid-template-columns: 1fr 1fr; }
        }

        .story-card {
            background: var(--card);
            padding: 15px;
            border-radius: 10px;
            border-left: 4px solid var(--primary);
            cursor: pointer;
            transition: all 0.2s;
        }

        .story-card:hover {
            transform: scale(1.02);
            background: #222;
        }

        .ai-panel {
            background: #111;
            width: 100%;
            padding: 20px;
            border-top: 2px solid var(--primary);
            position: sticky;
            bottom: 0;
            z-index: 100;
        }

        @media (min-width: 1024px) {
            .ai-panel {
                width: 380px;
                height: 100vh;
                border-top: none;
                border-left: 2px solid var(--primary);
                top: 0;
            }
        }

        .chat-box {
            height: 200px;
            overflow-y: auto;
            background: rgba(0,0,0,0.4);
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 15px;
            font-size: 14px;
        }

        @media (min-width: 1024px) {
            .chat-box { height: calc(100vh - 280px); }
        }

        .msg-user { color: var(--primary); font-weight: bold; text-align: right; margin-bottom: 10px; }
        .msg-bot { color: #fff; border-left: 2px solid var(--primary); padding-left: 10px; margin-bottom: 10px; white-space: pre-wrap; }

        .input-group { display: flex; flex-direction: column; gap: 8px; }

        input {
            background: #222;
            border: 1px solid #444;
            color: white;
            padding: 12px;
            border-radius: 8px;
            outline: none;
        }

        .btn-action {
            background: var(--primary);
            color: black;
            border: none;
            padding: 12px;
            border-radius: 8px;
            font-weight: 800;
            cursor: pointer;
            text-transform: uppercase;
        }

        .loader { display: none; text-align: center; color: var(--primary); margin-bottom: 8px; font-size: 12px; }
    </style>
</head>
<body>

<div class="container">
    <main class="magazine-view">
        <div class="hero-card">
            <div class="tagline">Exploração Digital Interativa</div>
            <h1>Encantos da<br><span style="color:var(--primary)">Fauna Brasil</span></h1>
            <p style="font-size: 14px; max-width: 400px; margin-top: 10px;">Toque num animal para que a nossa IA conte um segredo fascinante.</p>
        </div>

        <div class="grid" id="animalsGrid"></div>
    </main>

    <aside class="ai-panel">
        <div style="margin-bottom:15px; color:var(--primary); font-weight:800; font-size: 12px;">
            <i class="fas fa-sparkles"></i> EXPLORADOR IA ATIVO
        </div>
        
        <div class="chat-box" id="chatArea">
            <div class="msg-bot">Pronto para a expedição. Escolha um animal!</div>
        </div>

        <div id="loading" class="loader"><i class="fas fa-spinner fa-spin"></i> A consultar arquivos biológicos...</div>
        
        <div class="input-group">
            <input type="text" id="userIn" placeholder="Faça uma pergunta..." onkeypress="if(event.key==='Enter') sendMessage()">
            <button class="btn-action" onclick="sendMessage()">Perguntar</button>
        </div>
    </aside>
</div>

<script>
    // --- SUA CHAVE CONFIGURADA ---
    const p1 = "AQ.Ab8RN6Ip9tT"; 
    const p2 = "jmvIHd8U1p0FXaYNccY4uLYrAvV14RAvbEb0PlA"; 
    const apiKey = p1 + p2; 
    const model = "gemini-2.5-flash-preview-09-2025";

    const animais = ["Poraquê", "Urutau", "Sapo-de-Vidro", "Lobo-Guará", "Onça-Pintada", "Boto-Cor-de-Rosa", "Ariranha", "Gavião-Real", "Tamanduá-Bandeira", "Tatu-Bola", "Jacaré-Açu", "Surucucu", "João-de-Barro", "Peixe-Boi", "Jararaca-Ilhoa", "Sucuri-Verde", "Preguiça-Real", "Arara-Azul", "Mico-Leão-Dourado", "Tucano-Toco"];
    
    const grid = document.getElementById('animalsGrid');
    animais.forEach((nome, i) => {
        grid.innerHTML += `
            <div class="story-card" onclick="askIA('${nome}')">
                <strong>${(i+1)}. ${nome}</strong>
                <p style="font-size: 12px; opacity: 0.7;">Clique para ver mistérios.</p>
            </div>
        `;
    });

    async function callGemini(prompt) {
        const url = `https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${apiKey}`;
        const payload = {
            contents: [{ parts: [{ text: prompt }] }],
            systemInstruction: { parts: [{ text: "És um biólogo da revista Encantos da Fauna Brasil. Responde em Português de Portugal de forma curta e fascinante." }] }
        };

        try {
            const response = await fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });
            const data = await response.json();
            return data.candidates?.[0]?.content?.parts?.[0]?.text || "Lamento, não consegui obter essa informação agora.";
        } catch (e) {
            return "Erro ao ligar à IA. Verifique a sua chave.";
        }
    }

    const chatArea = document.getElementById('chatArea');
    const loading = document.getElementById('loading');

    function addMessage(text, type) {
        const div = document.createElement('div');
        div.className = `msg-${type}`;
        div.innerText = text;
        chatArea.appendChild(div);
        chatArea.scrollTop = chatArea.scrollHeight;
    }

    async function askIA(animal) {
        addMessage(`Diz-me sobre: ${animal}`, 'user');
        loading.style.display = 'block';
        const resp = await callGemini(`Diz-me um segredo incrível sobre o ${animal}`);
        loading.style.display = 'none';
        addMessage(resp, 'bot');
    }

    async function sendMessage() {
        const input = document.getElementById('userIn');
        const text = input.value.trim();
        if(!text) return;
        addMessage(text, 'user');
        input.value = '';
        loading.style.display = 'block';
        const resp = await callGemini(text);
        loading.style.display = 'none';
        addMessage(resp, 'bot');
    }
</script>

</body>
</html>
